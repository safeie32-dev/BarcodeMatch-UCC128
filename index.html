<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1769e0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Barcode Checker">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="app-icon-192.png">
  <link rel="apple-touch-icon" href="app-icon-192.png">
  <title>Barcode Match Checker</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #5e6a78;
      --line: #d8dee6;
      --blue: #1769e0;
      --green: #078244;
      --red: #c72b2b;
      --amber: #a56300;
      --shadow: 0 14px 38px rgba(25, 35, 48, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: max(10px, env(safe-area-inset-top)) 10px max(12px, env(safe-area-inset-bottom));
    }

    main {
      width: min(100%, 560px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    header {
      padding: 2px 2px 0;
      text-align: center;
    }

    .brand-barcode {
      width: min(210px, 62vw);
      height: 42px;
      margin: 0 auto 8px;
      border-radius: 6px;
      background:
        linear-gradient(
          90deg,
          #111 0 4%,
          transparent 4% 7%,
          #111 7% 10%,
          transparent 10% 13%,
          #111 13% 21%,
          transparent 21% 25%,
          #111 25% 27%,
          transparent 27% 32%,
          #111 32% 38%,
          transparent 38% 42%,
          #111 42% 45%,
          transparent 45% 51%,
          #111 51% 59%,
          transparent 59% 63%,
          #111 63% 66%,
          transparent 66% 70%,
          #111 70% 78%,
          transparent 78% 82%,
          #111 82% 87%,
          transparent 87% 91%,
          #111 91% 94%,
          transparent 94% 100%
        );
      background-color: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 4px 12px rgba(25, 35, 48, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 6vw, 1.8rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.35;
    }

    .result {
      min-height: 92px;
      border-radius: 8px;
      padding: 16px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #edf1f5;
      border: 1px solid var(--line);
      transition: background 140ms ease, color 140ms ease, border-color 140ms ease;
    }

    .result strong {
      display: block;
      font-size: clamp(2rem, 11vw, 3.8rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .result span {
      display: block;
      margin-top: 8px;
      font-size: clamp(0.95rem, 4vw, 1.2rem);
      font-weight: 600;
    }

    .result.match {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .result.mismatch {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .scanner {
      display: none;
      overflow: hidden;
      position: relative;
      min-height: 260px;
      border-radius: 8px;
      background: #101820;
      box-shadow: var(--shadow);
    }

    .scanner.active {
      display: block;
    }

    video {
      width: 100%;
      height: min(46vh, 270px);
      object-fit: cover;
      display: block;
    }

    .scan-frame {
      position: absolute;
      inset: 22%;
      border: 3px solid rgba(255, 255, 255, 0.92);
      border-radius: 8px;
      box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.38);
      pointer-events: none;
    }

    .scanner-label {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      color: #15202b;
      font-weight: 700;
      text-align: center;
    }

    .fields {
      display: grid;
      gap: 9px;
    }

    .field-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      box-shadow: 0 6px 18px rgba(25, 35, 48, 0.07);
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 800;
      font-size: 0.98rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid #bfc8d3;
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 1rem;
      color: var(--ink);
      background: #fff;
      text-align: center;
    }

    input:disabled {
      border-color: var(--green);
      background: #edf9f2;
      color: var(--green);
      opacity: 1;
      font-weight: 800;
    }

    input:focus,
    button:focus-visible {
      outline: 3px solid rgba(23, 105, 224, 0.22);
      outline-offset: 2px;
      border-color: var(--blue);
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
      font-weight: 800;
      color: #fff;
      background: var(--blue);
      cursor: pointer;
      touch-action: manipulation;
    }

    button.clear {
      background: #202a36;
    }

    button:disabled {
      background: #9aa5b1;
      cursor: not-allowed;
    }

    .status {
      min-height: 24px;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.35;
      text-align: center;
    }

    .status.warn {
      color: var(--amber);
      font-weight: 700;
    }

    @media (max-width: 390px) {
      .controls,
      .input-row {
        grid-template-columns: 1fr;
      }

      .input-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="brand-barcode" aria-hidden="true"></div>
      <h1>Barcode Match Checker</h1>
      <p class="subtitle">สแกนข้อมูลชุดที่ 1 และชุดที่ 2 เพื่อตรวจสอบความถูกต้อง</p>
    </header>

    <section id="result" class="result" aria-live="polite">
      <div>
        <strong>READY</strong>
        <span>พร้อมเริ่มสแกน</span>
      </div>
    </section>

    <section id="scanner" class="scanner" aria-label="กล้องสแกนบาร์โค้ด">
      <video id="video" playsinline muted></video>
      <div class="scan-frame"></div>
      <div id="scannerLabel" class="scanner-label">กำลังสแกน</div>
    </section>

    <section class="fields">
      <div class="field-card">
        <label for="code1">Forwarder</label>
        <div class="input-row">
          <input id="code1" autocomplete="off" inputmode="none" placeholder="สแกน Forwarder" readonly>
          <button type="button" data-scan="code1">สแกน</button>
        </div>
      </div>

      <div class="field-card">
        <label for="code2">UCC-128</label>
        <div class="input-row">
          <input id="code2" autocomplete="off" inputmode="none" placeholder="สแกน UCC-128" readonly>
          <button type="button" data-scan="code2">สแกน</button>
        </div>
      </div>
    </section>

    <section class="controls">
      <button id="clear" class="clear" type="button">Clear</button>
    </section>

    <div id="status" class="status"></div>
  </main>

  <script>
    (function () {
      "use strict";

      var code1 = document.getElementById("code1");
      var code2 = document.getElementById("code2");
      var result = document.getElementById("result");
      var status = document.getElementById("status");
      var scanner = document.getElementById("scanner");
      var scannerLabel = document.getElementById("scannerLabel");
      var video = document.getElementById("video");
      var clear = document.getElementById("clear");

      var detector = null;
      var stream = null;
      var scanTarget = code1;
      var scanning = false;
      var lastValue = "";
      var lastTime = 0;
      var lastComparedPair = "";
      var audioContext = null;

      var barcodeFormats = [
        "aztec",
        "code_128",
        "code_39",
        "code_93",
        "codabar",
        "data_matrix",
        "ean_13",
        "ean_8",
        "itf",
        "pdf417",
        "qr_code",
        "upc_a",
        "upc_e"
      ];

      function clean(value) {
        return value.trim();
      }

      function isCompleteCode(value) {
        return /^\d{10}$/.test(clean(value));
      }

      function fieldName(input) {
        return input === code1 ? "Forwarder" : "UCC-128";
      }

      function setStatus(message, warning) {
        status.textContent = message;
        status.classList.toggle("warn", Boolean(warning));
      }

      function showResult(type, headline, detail) {
        result.className = "result" + (type ? " " + type : "");
        result.innerHTML = "<div><strong>" + headline + "</strong><span>" + detail + "</span></div>";
      }

      function playTone(frequency, startTime, duration, volume) {
        var oscillator = audioContext.createOscillator();
        var gain = audioContext.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(frequency, startTime);
        gain.gain.setValueAtTime(0.001, startTime);
        gain.gain.exponentialRampToValueAtTime(volume, startTime + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

        oscillator.connect(gain);
        gain.connect(audioContext.destination);
        oscillator.start(startTime);
        oscillator.stop(startTime + duration + 0.02);
      }

      function playResultSound(type) {
        var message = type === "match" ? "OK" : "MISMATCH";

        if (!("speechSynthesis" in window) || !("SpeechSynthesisUtterance" in window)) {
          return;
        }

        window.speechSynthesis.cancel();

        var utterance = new SpeechSynthesisUtterance(message);
        utterance.lang = "en-US";
        utterance.rate = 0.95;
        utterance.pitch = type === "match" ? 1.05 : 0.85;
        utterance.volume = 1;

        window.speechSynthesis.speak(utterance);
      }

      function vibrate(pattern) {
        if ("vibrate" in navigator) {
          navigator.vibrate(pattern);
        }
      }

      function playLockSound() {
        var AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) {
          return;
        }

        if (!audioContext) {
          audioContext = new AudioContext();
        }

        if (audioContext.state === "suspended") {
          audioContext.resume();
        }

        playTone(1046, audioContext.currentTime, 0.07, 0.16);
        vibrate(60);
      }

      function compareIfReady() {
        var first = clean(code1.value);
        var second = clean(code2.value);
        var pairKey = "";

        if (!isCompleteCode(first) || !isCompleteCode(second)) {
          lastComparedPair = "";
          showResult("", "READY", "รอข้อมูลให้ครบทั้ง 2 ชุด");
          return;
        }

        pairKey = first + "|" + second;
        if (pairKey === lastComparedPair) {
          return;
        }
        lastComparedPair = pairKey;

        if (first === second) {
          showResult("match", "MATCH", "ข้อความเหมือนกัน");
          vibrate([80, 50, 80]);
          playResultSound("match");
        } else {
          showResult("mismatch", "MISMATCH", "ข้อความไม่เหมือนกัน");
          vibrate([180, 80, 180, 80, 180]);
          playResultSound("mismatch");
        }
      }

      function nextEmptyInput() {
        if (!isCompleteCode(code1.value)) {
          return code1;
        }
        if (!isCompleteCode(code2.value)) {
          return code2;
        }
        return null;
      }

      function selectTarget(target) {
        var next = nextEmptyInput();
        scanTarget = target && !target.disabled ? target : next;
        scannerLabel.textContent = scanTarget ? "กำลังสแกน: " + fieldName(scanTarget) : "ข้อมูลครบทั้งสองช่อง";
      }

      function lockIfComplete(input) {
        var value = clean(input.value);

        input.value = value;

        if (!value) {
          input.disabled = false;
          compareIfReady();
          return false;
        }

        if (isCompleteCode(value)) {
          input.disabled = true;
          playLockSound();
          setStatus(fieldName(input) + " สมบูรณ์: ล็อคข้อมูลแล้ว", false);
          compareIfReady();
          return true;
        }

        input.disabled = false;
        showResult("", "READY", "รอข้อมูลตัวเลข 10 หลัก");
        setStatus(fieldName(input) + " ต้องเป็นตัวเลข 10 หลัก", true);
        return false;
      }

      function fillTarget(value) {
        var now = Date.now();
        if (value === lastValue && now - lastTime < 1400) {
          return;
        }
        lastValue = value;
        lastTime = now;

        if (!scanTarget || scanTarget.disabled) {
          selectTarget(nextEmptyInput());
        }

        if (!scanTarget) {
          setStatus("ข้อมูลครบทั้งสองช่องแล้ว กด Clear เพื่อเริ่มใหม่", false);
          return;
        }

        scanTarget.value = value;

        if (lockIfComplete(scanTarget)) {
          var next = nextEmptyInput();
          closeCamera(false);
          selectTarget(next);
          if (next && !next.disabled) {
            setStatus("พร้อมสแกน " + fieldName(next) + " กดปุ่มสแกนเพื่อเริ่ม", false);
          }
        } else {
          setStatus(fieldName(scanTarget) + " ต้องเป็นตัวเลข 10 หลัก", true);
        }
      }

      async function getCameraStream() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("mediaDevices unavailable");
        }

        var attempts = [
          {
            video: {
              facingMode: { exact: "environment" },
              width: { ideal: 1280 },
              height: { ideal: 720 }
            },
            audio: false
          },
          {
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1280 },
              height: { ideal: 720 }
            },
            audio: false
          },
          {
            video: {
              facingMode: "environment"
            },
            audio: false
          },
          {
            video: true,
            audio: false
          }
        ];

        var lastError = null;
        for (var i = 0; i < attempts.length; i += 1) {
          try {
            return await navigator.mediaDevices.getUserMedia(attempts[i]);
          } catch (error) {
            lastError = error;
          }
        }

        throw lastError || new Error("camera unavailable");
      }

      async function scanLoop() {
        if (!scanning || !detector) {
          return;
        }

        try {
          var barcodes = await detector.detect(video);
          if (barcodes && barcodes.length) {
            fillTarget(barcodes[0].rawValue || "");
          }
        } catch (error) {
          setStatus("กล้องพร้อม แต่เบราว์เซอร์อ่านบาร์โค้ดไม่ได้ในจังหวะนี้", true);
        }

        if (scanning) {
          requestAnimationFrame(scanLoop);
        }
      }

      function cameraErrorMessage(error) {
        var name = error && error.name ? error.name : "";

        if (location.protocol !== "https:" && location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
          return "เปิดกล้องไม่ได้: ต้องเปิดผ่าน HTTPS";
        }

        if (name === "NotAllowedError" || name === "PermissionDeniedError") {
          return "เปิดกล้องไม่ได้: กรุณาอนุญาตสิทธิ์กล้องในเบราว์เซอร์";
        }

        if (name === "NotFoundError" || name === "DevicesNotFoundError") {
          return "เปิดกล้องไม่ได้: ไม่พบกล้องบนอุปกรณ์นี้";
        }

        if (name === "NotReadableError" || name === "TrackStartError") {
          return "เปิดกล้องไม่ได้: กล้องอาจถูกแอพอื่นใช้งานอยู่";
        }

        if (name === "OverconstrainedError" || name === "ConstraintNotSatisfiedError") {
          return "เปิดกล้องไม่ได้: มือถือไม่รองรับการตั้งค่ากล้องนี้";
        }

        return "เปิดกล้องไม่ได้: กรุณาเปิดด้วย Chrome/Safari โดยตรง และอนุญาตสิทธิ์กล้อง";
      }

      async function openCamera(target) {
        if (target && target.disabled) {
          target = nextEmptyInput();
        }
        selectTarget(target);

        if (!scanTarget) {
          setStatus("ข้อมูลครบทั้งสองช่องแล้ว กด Clear เพื่อเริ่มใหม่", false);
          return;
        }

        if (stream) {
          scanner.classList.add("active");
          if (detector) {
            setStatus("เล็งบาร์โค้ดให้อยู่ในกรอบ", false);
          }
          return;
        }

        try {
          stream = await getCameraStream();

          video.srcObject = stream;
          await video.play();
          scanning = true;
          scanner.classList.add("active");

          if ("BarcodeDetector" in window) {
            detector = new BarcodeDetector({ formats: barcodeFormats });
            setStatus("เล็งบาร์โค้ดให้อยู่ในกรอบ", false);
            scanLoop();
          } else {
            detector = null;
            setStatus("เปิดกล้องได้ แต่เบราว์เซอร์นี้ยังไม่รองรับการอ่านบาร์โค้ดอัตโนมัติ กรุณาใช้ Chrome บน Android หรือยิงบาร์โค้ดเข้าช่อง", true);
          }
        } catch (error) {
          setStatus(cameraErrorMessage(error), true);
        }
      }

      function closeCamera(clearMessage) {
        scanning = false;
        if (stream) {
          stream.getTracks().forEach(function (track) {
            track.stop();
          });
        }
        stream = null;
        video.srcObject = null;
        scanner.classList.remove("active");
        if (clearMessage !== false) {
          setStatus("", false);
        }
      }

      function clearAll() {
        closeCamera();
        code1.disabled = false;
        code2.disabled = false;
        code1.value = "";
        code2.value = "";
        lastValue = "";
        lastTime = 0;
        lastComparedPair = "";
        selectTarget(code1);
        showResult("", "READY", "พร้อมเริ่มสแกน");
        setStatus("ล้างข้อมูลแล้ว พร้อมสแกนคู่ใหม่", false);
      }

      code1.addEventListener("input", function () {
        if (lockIfComplete(code1)) {
          var next = nextEmptyInput();
          selectTarget(next);
        }
      });
      code2.addEventListener("input", function () {
        if (lockIfComplete(code2)) {
          var next = nextEmptyInput();
          selectTarget(next);
        }
      });

      [code1, code2].forEach(function (input) {
        input.addEventListener("focus", function () {
          input.blur();
          selectTarget(input);
        });
        input.addEventListener("keydown", function (event) {
          event.preventDefault();
        });
        input.addEventListener("paste", function (event) {
          event.preventDefault();
        });
      });

      document.querySelectorAll("[data-scan]").forEach(function (button) {
        button.addEventListener("click", function () {
          var target = document.getElementById(button.getAttribute("data-scan"));
          openCamera(target);
        });
      });

      clear.addEventListener("click", clearAll);

      window.addEventListener("pagehide", closeCamera);

      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js").catch(function () {});
        });
      }

      selectTarget(code1);
    })();
  </script>
</body>
</html>
